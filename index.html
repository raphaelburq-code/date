<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notre date 💌</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #fff; color: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .screen { display: none; min-height: 480px; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; max-width: 620px; width: 100%; margin: auto; }
    .screen.active { display: flex; }
    h1 { font-size: 24px; font-weight: 500; color: #111; margin-bottom: 0.5rem; }
    .sub { font-size: 16px; color: #666; margin-bottom: 2rem; line-height: 1.6; }
    .emoji-big { font-size: 64px; margin-bottom: 1rem; }

    .btn-yes { background: #f1f0eb; color: #111; border: 0.5px solid #ccc; font-size: 18px; padding: 16px 48px; border-radius: 50px; font-weight: 500; cursor: pointer; transition: transform 0.15s; }
    .btn-yes:hover { transform: scale(1.05); }
    .btn-no { background: #f1f0eb; color: #888; border: 0.5px solid #ddd; position: absolute; font-size: 14px; padding: 10px 24px; border-radius: 50px; font-weight: 500; cursor: pointer; }
    .btn-row { position: relative; display: flex; align-items: center; justify-content: center; gap: 1.5rem; height: 60px; width: 100%; }

    .calendar-wrap { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem; width: 100%; max-width: 380px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .cal-header span { font-weight: 500; font-size: 15px; }
    .cal-nav { background: none; border: none; cursor: pointer; color: #888; font-size: 22px; padding: 4px 10px; border-radius: 6px; }
    .cal-nav:hover { background: #f1f0eb; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-label { font-size: 12px; color: #aaa; text-align: center; padding: 4px 0; }
    .cal-day { font-size: 14px; text-align: center; padding: 8px 4px; border-radius: 50%; cursor: pointer; color: #111; transition: background 0.1s; }
    .cal-day:hover { background: #f1f0eb; }
    .cal-day.selected { background: #e0ddd5; font-weight: 500; border: 1.5px solid #aaa; }
    .cal-day.past { color: #ccc; cursor: default; pointer-events: none; }
    .cal-day.empty { pointer-events: none; }
    .cal-day.today { font-weight: 500; border: 1px solid #bbb; }

    .btn-primary { background: #f1f0eb; color: #111; border: 0.5px solid #ccc; padding: 14px 40px; border-radius: 50px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 1.5rem; transition: transform 0.15s; }
    .btn-primary:hover { transform: scale(1.04); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .restos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; width: 100%; max-width: 560px; margin-bottom: 1.5rem; text-align: left; }
    .resto-card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .resto-card:hover { background: #f1f0eb; }
    .resto-card.selected { border: 1.5px solid #888; background: #f1f0eb; }
    .resto-card .resto-emoji { font-size: 28px; margin-bottom: 6px; }
    .resto-card .resto-name { font-size: 13px; font-weight: 500; color: #111; }

    .result-box { background: #f1f0eb; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.5rem 2rem; max-width: 400px; margin-top: 1rem; }
    .result-box .result-emoji { font-size: 48px; margin-bottom: 0.5rem; }
    .result-box h2 { font-size: 18px; font-weight: 500; color: #111; margin-bottom: 0.25rem; }
    .date-badge { display: inline-block; background: #fff; border: 0.5px solid #ccc; color: #111; padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 500; margin-top: 0.75rem; }
  </style>
</head>
<body>

<div id="s1" class="screen active">
  <div class="emoji-big">💌</div>
  <h1>Coucou didou love</h1>
  <p class="sub" style="margin-bottom:1.75rem;">Tu veux faire un date avec moi ?</p>
  <div class="btn-row">
    <button class="btn-yes" onclick="nextScreen(2)">Oui 💕</button>
    <button class="btn-no" id="btnNo" onmouseenter="runAway()" ontouchstart="runAway()">Non</button>
  </div>
</div>

<div id="s2" class="screen">
  <div class="emoji-big">📅</div>
  <h1>J'en étais sûr mon doudou</h1>
  <p class="sub">Choisis une date qui te convient :</p>
  <div class="calendar-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
      <span id="calTitle"></span>
      <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <button class="btn-primary" id="btnDate" disabled onclick="nextScreen(3)">Confirmer la date</button>
</div>

<div id="s3" class="screen">
  <div class="emoji-big">🍽️</div>
  <h1>Parfait !</h1>
  <p class="sub">Choisis le restau de tes rêves :</p>
  <div class="restos-grid" id="restoGrid"></div>
  <button class="btn-primary" id="btnResto" disabled onclick="showResult()">C'est parti !</button>
</div>

<div id="s4" class="screen">
  <div class="emoji-big">🎉</div>
  <h1>Voilà notre date mon petit coeur d'artichaut</h1>
  <div class="result-box">
    <div class="result-emoji" id="resEmoji"></div>
    <h2 id="resName"></h2>
    <div class="date-badge" id="resDate"></div>
  </div>
</div>

<script>
const restos = [
  { name: "Japonais", emoji: "🍣" },
  { name: "Italien", emoji: "🍝" },
  { name: "Taïwanais", emoji: "🥟" },
  { name: "Burger", emoji: "🍔" },
  { name: "Français", emoji: "🥂" },
  { name: "Mexicain", emoji: "🌮" },
  { name: "Thaïlandais", emoji: "🍜" },
  { name: "Libanais", emoji: "🧆" },
  { name: "Chinois", emoji: "🥡" },
  { name: "Coréen", emoji: "🍱" },
  { name: "Hawaïen", emoji: "🐟" },
  { name: "Pizza", emoji: "🍕" },
  { name: "Grill", emoji: "🥩" },
  { name: "Indien", emoji: "🍛" },
  { name: "Végétarien", emoji: "🥗" }
];

let selectedDate = null, selectedResto = null;
let viewYear = new Date().getFullYear(), viewMonth = new Date().getMonth();

function nextScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s' + n).classList.add('active');
  if (n === 2) renderCalendar();
  if (n === 3) renderRestos();
}

let noX = null, noY = null;
function runAway() {
  const btn = document.getElementById('btnNo');
  const pw = btn.parentElement.offsetWidth;
  let nx, ny, tries = 0;
  do {
    nx = Math.random() * (pw - 120);
    ny = (Math.random() - 0.5) * 80;
    tries++;
  } while (tries < 20 && Math.abs(nx - (noX||0)) < 100 && Math.abs(ny - (noY||0)) < 30);
  noX = nx; noY = ny;
  btn.style.position = 'absolute';
  btn.style.left = nx + 'px';
  btn.style.top = ny + 'px';
}

const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const days = ['Lu','Ma','Me','Je','Ve','Sa','Di'];

function renderCalendar() {
  document.getElementById('calTitle').textContent = months[viewMonth] + ' ' + viewYear;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  days.forEach(d => { const el = document.createElement('div'); el.className = 'cal-day-label'; el.textContent = d; grid.appendChild(el); });
  let startDay = new Date(viewYear, viewMonth, 1).getDay();
  startDay = startDay === 0 ? 6 : startDay - 1;
  for (let i = 0; i < startDay; i++) { const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el); }
  const today = new Date();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    const thisDate = new Date(viewYear, viewMonth, d);
    if (thisDate < new Date(today.getFullYear(), today.getMonth(), today.getDate())) el.classList.add('past');
    if (today.getDate() === d && today.getMonth() === viewMonth && today.getFullYear() === viewYear) el.classList.add('today');
    if (selectedDate && selectedDate.getDate() === d && selectedDate.getMonth() === viewMonth && selectedDate.getFullYear() === viewYear) el.classList.add('selected');
    el.onclick = () => { selectedDate = new Date(viewYear, viewMonth, d); document.getElementById('btnDate').disabled = false; renderCalendar(); };
    grid.appendChild(el);
  }
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
}

function renderRestos() {
  const grid = document.getElementById('restoGrid');
  grid.innerHTML = '';
  restos.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'resto-card';
    card.innerHTML = `<div class="resto-emoji">${r.emoji}</div><div class="resto-name">${r.name}</div>`;
    card.onclick = () => {
      document.querySelectorAll('.resto-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedResto = i;
      document.getElementById('btnResto').disabled = false;
    };
    grid.appendChild(card);
  });
}

function showResult() {
  const r = restos[selectedResto];
  document.getElementById('resEmoji').textContent = r.emoji;
  document.getElementById('resName').textContent = r.name;
  document.getElementById('resDate').textContent = selectedDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  nextScreen(4);
}
</script>
</body>
</html>
